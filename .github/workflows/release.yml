name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:  # Optional: allows manual trigger

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Get version from .csproj
        id: get_version
        run: |
          # Read Version from XOSC.csproj
          $xml = [xml](Get-Content XOSC.csproj)
          $version = $xml.Project.PropertyGroup.Version
          if (-not $version) {
            $version = $xml.Project.PropertyGroup.AssemblyVersion
          }
          if (-not $version) {
            $version = "1.0.0"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Found version: $version"
        shell: powershell

      - name: Build project
        run: dotnet publish -c Release -o ./publish XOSC.csproj

      - name: Create ZIP archive
        run: |
          cd ./publish
          Compress-Archive -Path * -DestinationPath XOSC.zip
          cd ..

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ./publish/XOSC.zip
          tag: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          prerelease: false
          allowUpdates: true
          generateReleaseNotes: true  # Auto-generates release notes from commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}