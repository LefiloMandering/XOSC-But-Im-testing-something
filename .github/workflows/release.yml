name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump Version
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION:-0.0.0}"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"
        shell: bash

  build:
    needs: versioning
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: |
          dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:PublishSingleFile=true -p:DebugType=none \
            -p:EnableCompressionInSingleFile=true \
            -p:InformationalVersion=${{ needs.versioning.outputs.version }} \
            -o ./publish/${{ matrix.rid }} XOSC.csproj
        shell: bash

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.rid }}
          path: ./publish/${{ matrix.rid }}

  appimage:
    needs: [versioning, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: build-linux-x64
          path: ./publish/linux-x64

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp -r ./publish/linux-x64/* AppDir/usr/bin/

          touch AppDir/xosc.png

          cat > AppDir/xosc.desktop << EOF
          [Desktop Entry]
          Name=XOSC
          Exec=usr/bin/XOSC
          Icon=xosc
          Type=Application
          Categories=Utility;
          Terminal=false
          EOF

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/usr/bin/XOSC" "$@"
          EOF
          chmod +x AppDir/AppRun
          chmod +x AppDir/usr/bin/XOSC

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir XOSC-x86_64.AppImage
        shell: bash

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: XOSC-x86_64.AppImage

  package:
    needs: [versioning, build, appimage]
    runs-on: ubuntu-latest

    steps:
      - name: Download all
        uses: actions/download-artifact@v4
        with:
          path: ./builds

      - name: Create XOSC.zip
        run: |
          mkdir -p XOSC/win-x64 XOSC/linux-x64
          
          cp -r builds/build-win-x64/* XOSC/win-x64/ 2>/dev/null || true
          cp -r builds/build-linux-x64/* XOSC/linux-x64/ 2>/dev/null || true
          cp builds/appimage/XOSC-x86_64.AppImage XOSC/linux-x64/ 2>/dev/null || true
          
          cd XOSC && zip -r ../XOSC.zip .
        shell: bash

      - name: Upload final XOSC.zip
        uses: actions/upload-artifact@v4
        with:
          name: XOSC
          path: XOSC.zip

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download XOSC.zip
        uses: actions/download-artifact@v4
        with:
          name: XOSC

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: XOSC.zip
          tag: {{ needs.versioning.outputs.version }}
          name: {{ needs.versioning.outputs.version }}
          prerelease: false
          makeLatest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}