name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            singlefile: true
            appimage: false

          - os: ubuntu-latest
            rid: linux-x64
            singlefile: true
            appimage: false

          - os: ubuntu-latest
            rid: linux-x64
            singlefile: false
            appimage: true

    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Get short commit hash
        id: version
        run: echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:PublishSingleFile=${{ matrix.singlefile }} \
            -p:DebugType=none \
            -p:EnableCompressionInSingleFile=true \
            -p:InformationalVersion=${{ steps.version.outputs.version }} \
            -o ./publish/${{ matrix.rid }} XOSC.csproj
        shell: bash

      - name: Install FUSE
        if: matrix.appimage
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Create AppImage
        if: matrix.appimage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps

          cp -r ./publish/linux-x64/* AppDir/usr/bin/

          cat > AppDir/xosc.desktop << EOF
          [Desktop Entry]
          Name=XOSC
          Exec=XOSC
          Icon=xosc
          Type=Application
          Categories=Utility;
          Terminal=false
          EOF

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/usr/bin/XOSC" "$@"
          EOF
          chmod +x AppDir/AppRun

          if [ -f "icon.png" ]; then
            cp icon.png AppDir/xosc.png
            cp icon.png AppDir/usr/share/icons/hicolor/256x256/apps/xosc.png
          fi

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir XOSC-x86_64.AppImage
        shell: bash

      - name: Create platform ZIP
        if: ${{ !matrix.appimage }}
        run: |
          cd publish
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            powershell -Command "Compress-Archive -Path ${{ matrix.rid }} -DestinationPath ../XOSC-${{ matrix.rid }}.zip -Force"
          else
            zip -r ../XOSC-${{ matrix.rid }}.zip ${{ matrix.rid }}
          fi
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.rid }}${{ matrix.appimage && '-appimage' || '' }}
          path: |
            XOSC-*.zip
            XOSC-*.AppImage

  package:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          path: ./builds

      - name: Create final XOSC.zip
        run: |
          mkdir -p final/XOSC
          
          unzip -o builds/build-win-x64/XOSC-win-x64.zip -d final/XOSC/ 2>/dev/null || true
          unzip -o builds/build-linux-x64/XOSC-linux-x64.zip -d final/XOSC/ 2>/dev/null || true
          cp builds/build-linux-x64-appimage/XOSC-x86_64.AppImage final/XOSC/ 2>/dev/null || true
          
          cd final
          zip -r ../XOSC.zip XOSC/
        shell: bash

      - name: Upload final XOSC.zip
        uses: actions/upload-artifact@v4
        with:
          name: XOSC
          path: XOSC.zip

  release:
    needs: [build, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download XOSC.zip
        uses: actions/download-artifact@v4
        with:
          name: XOSC
          path: ./

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: XOSC.zip
          tag: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          prerelease: false
          makeLatest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}