name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore
        run: dotnet restore

      - name: Get version
        id: version
        run: echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish
        run: |
          dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:PublishSingleFile=true -p:DebugType=none \
            -p:EnableCompressionInSingleFile=true \
            -o ./publish/${{ matrix.rid }} XOSC.csproj
        shell: bash

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.rid }}
          path: ./publish/${{ matrix.rid }}

  appimage:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: build-linux-x64
          path: ./publish/linux-x64

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp -r ./publish/linux-x64/* AppDir/usr/bin/

          cat > AppDir/xosc.desktop << EOF
          [Desktop Entry]
          Name=XOSC
          Exec=XOSC
          Type=Application
          Categories=Utility;
          Terminal=false
          EOF

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/usr/bin/XOSC" "$@"
          EOF
          chmod +x AppDir/AppRun

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          # Correct command as per AppImage docs
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir XOSC-x86_64.AppImage
        shell: bash
        
  package:
    needs: [build, appimage]
    runs-on: ubuntu-latest

    steps:
      - name: Download all
        uses: actions/download-artifact@v4
        with:
          path: ./builds

      - name: Create XOSC.zip
        run: |
          mkdir -p XOSC/win-x64 XOSC/linux-x64
          
          cp -r builds/build-win-x64/* XOSC/win-x64/ 2>/dev/null || true
          cp -r builds/build-linux-x64/* XOSC/linux-x64/ 2>/dev/null || true
          cp builds/appimage/XOSC-x86_64.AppImage XOSC/linux-x64/ 2>/dev/null || true
          
          cd XOSC && zip -r ../XOSC.zip .
        shell: bash

      - name: Upload final
        uses: actions/upload-artifact@v4
        with:
          name: XOSC
          path: XOSC.zip

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: XOSC

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: XOSC.zip
          tag: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          makeLatest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}