name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            singlefile: true
            appimage: false

          - os: ubuntu-latest
            rid: linux-x64
            singlefile: true
            appimage: false

          - os: ubuntu-latest
            rid: linux-x64
            singlefile: false
            appimage: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Get short commit hash
        id: version
        run: echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:PublishSingleFile=${{ matrix.singlefile }} \
            -p:DebugType=none \
            -p:EnableCompressionInSingleFile=true \
            -p:InformationalVersion=${{ steps.version.outputs.version }} \
            -o ./publish/${{ matrix.rid }} XOSC.csproj
        shell: bash

      # AppImage
      - name: Install FUSE
        if: matrix.appimage
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Create AppImage
        if: matrix.appimage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps

          cp -r ./publish/linux-x64/* AppDir/usr/bin/

          cat > AppDir/xosc.desktop << EOF
          [Desktop Entry]
          Name=XOSC
          Exec=XOSC
          Icon=xosc
          Type=Application
          Categories=Utility;
          Terminal=false
          EOF

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/usr/bin/XOSC" "$@"
          EOF
          chmod +x AppDir/AppRun

          if [ -f "icon.png" ]; then
            cp icon.png AppDir/xosc.png
            cp icon.png AppDir/usr/share/icons/hicolor/256x256/apps/xosc.png
          fi

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir XOSC-${{ steps.version.outputs.version }}-x86_64.AppImage
        shell: bash

      # ZIP per platform
      - name: Create platform ZIP
        if: ${{ !matrix.appimage }}
        run: |
          cd publish
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            powershell -Command "Compress-Archive -Path ${{ matrix.rid }} -DestinationPath ../XOSC-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip -Force"
          else
            zip -r ../XOSC-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip ${{ matrix.rid }}
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XOSC-${{ matrix.rid }}${{ matrix.appimage && '-AppImage' || '' }}
          path: |
            XOSC-*.zip
            XOSC-*.AppImage

  # Final job: Create one big universal ZIP
  package-all:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Universal ZIP (All Platforms)
        run: |
          cd artifacts
          mkdir -p XOSC-All
          cp */*.zip XOSC-All/ 2>/dev/null || true
          cp */*.AppImage XOSC-All/ 2>/dev/null || true
          cd XOSC-All
          zip -r ../XOSC-${{ needs.build.outputs.version || github.sha }}-ALL.zip .
        shell: bash

      - name: Upload Universal ZIP
        uses: actions/upload-artifact@v4
        with:
          name: XOSC-ALL
          path: XOSC-*-ALL.zip

  release:
    needs: [build, package-all]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ./artifacts/**/*.{zip,AppImage}
          tag: v${{ steps.version.outputs.version || github.sha }}
          name: v${{ steps.version.outputs.version || github.sha }}
          prerelease: false
          makeLatest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}