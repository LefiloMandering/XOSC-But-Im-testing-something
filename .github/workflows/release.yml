name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Get Git commit hash
        id: get_version
        run: |
          $hash = "${{ github.sha }}".Substring(0, 7)
          echo "version=$hash" >> $env:GITHUB_OUTPUT
          echo "Found commit hash: $hash"
        shell: powershell

      - name: Build for Windows x64
        run: dotnet publish -c Release -r win-x64 --self-contained true -o ./publish/win-x64 XOSC.csproj

      - name: Build for Linux x64
        run: dotnet publish -c Release -r linux-x64 --self-contained true -o ./publish/linux-x64 XOSC.csproj

      - name: Create ZIP archive with both platforms
        run: |
          Compress-Archive -Path ./publish/* -DestinationPath XOSC.zip
          Write-Host "Created XOSC.zip with win-x64 and linux-x64 folders"
        shell: powershell

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ./XOSC.zip
          tag: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          prerelease: false
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}